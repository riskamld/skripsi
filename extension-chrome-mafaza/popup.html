<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafaza Fortuna Scraper</title>
    <style>
        body {
            width: 350px;
            min-height: 500px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            margin: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
            color: #2c3e50;
            font-weight: 600;
        }

        .header p {
            color: #7f8c8d;
            font-size: 12px;
            margin: 5px 0 0 0;
        }

        .status-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #27ae60;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .status-card.error {
            border-left-color: #e74c3c;
        }

        .status-card.warning {
            border-left-color: #f39c12;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-text {
            font-size: 12px;
            color: #7f8c8d;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #2c3e50;
            font-size: 12px;
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #ddd;
            color: #666;
        }

        .btn-outline:hover {
            background: #f8f9fa;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .alert {
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 11px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .tab-button {
            flex: 1;
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-button:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ Mafaza Fortuna</h1>
            <p>Place Data Scraper</p>
        </div>

        <!-- Status Card -->
        <div id="status-card" class="status-card">
            <div class="status-title">
                <span id="status-icon">🔄</span>
                <span id="status-title">Initializing...</span>
            </div>
            <div id="status-text" class="status-text">Checking extension status</div>
        </div>

        <!-- Progress Bar -->
        <div id="progress-container" class="hidden">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <!-- Alert Messages -->
        <div id="alert-container"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-button active" data-tab="dashboard">Dashboard</button>
            <button class="tab-button" data-tab="settings">Settings</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard-tab" class="tab-content active">
            <!-- Stats -->
            <div id="stats-section" class="stats">
                <div class="stat-item">
                    <span id="scraped-count" class="stat-number">0</span>
                    <span class="stat-label">Scraped Today</span>
                </div>
                <div class="stat-item">
                    <span id="queued-count" class="stat-number">0</span>
                    <span class="stat-label">In Queue</span>
                </div>
            </div>

            <!-- Toggle Auto-Scraping -->
            <div class="toggle-group">
                <label>Auto-Scraping</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="auto-scraping-toggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button class="btn btn-primary" data-action="scrape">
                    🔍 Scrape Page
                </button>
                <button class="btn btn-success" data-action="dashboard">
                    📊 Dashboard
                </button>
            </div>

            <button class="btn btn-outline" data-action="clear" style="width: 100%;">
                🗑️ Clear Local Data
            </button>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content">
            <div class="form-group">
                <label for="api-url">API URL</label>
                <input type="url" id="api-url" class="form-control"
                       placeholder="http://localhost/mafaza_fortuna/public/api">
            </div>

            <div class="form-group">
                <label for="api-token">API Token</label>
                <input type="password" id="api-token" class="form-control"
                       placeholder="Your API token">
            </div>

            <div class="form-group">
                <label for="scrape-delay">Scrape Delay (seconds)</label>
                <input type="number" id="scrape-delay" class="form-control"
                       min="1" max="30" value="2">
            </div>

            <div class="toggle-group">
                <label>Enable Notifications</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="notifications-toggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <button class="btn btn-primary" data-action="save" style="width: 100%;">
                💾 Save Settings
            </button>
        </div>

        <!-- Loading Overlay -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>Processing...</div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
